# .gitlab-ci.yml for QuickKart Playwright Automation (Fixing Allure Java Error)

stages:
  - test
  - report

# Main test job
playwright-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  script:
    - npm ci
    - npx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - allure-results/
      - test-results/
    expire_in: 30 days

# Allure report generation job
generate-allure:
  stage: report
  image: node:18
  dependencies:
    - playwright-tests
  script:
    # Install Java (Required for Allure)
    - apt-get update && apt-get install -y default-jre
    - npm install -g allure-commandline
    - npm run allure:generate
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 30 days
  allow_failure: true
