# .gitlab-ci.yml for QuickKart Playwright Automation (Fixing Allure Java Error)

stages:
  - test
  - deploy

# Main test job
playwright-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  script:
    - npm ci
    - npx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - allure-results/
      - test-results/
    expire_in: 30 days

# GitLab Pages hosting (Name must be 'pages')
pages:
  stage: deploy
  image: node:18
  dependencies:
    - playwright-tests
  script:
    - apt-get update && apt-get install -y default-jre
    - npm install -g allure-commandline
    - npm run allure:generate
    - mv allure-report public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  allow_failure: true
